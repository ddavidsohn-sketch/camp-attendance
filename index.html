<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camp Attendance 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root { --green: #4CAF50; --red: #F44336; --bg: #f4f7f6; }
        body { background: var(--bg); font-family: sans-serif; overflow: hidden; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        #card-container { position: relative; width: 320px; height: 450px; margin-top: 50px; }
        .card { position: absolute; width: 100%; height: 100%; background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; justify-content: center; align-items: center; touch-action: none; transition: transform 0.2s ease; border: 6px solid transparent; }
        .card h2 { font-size: 2rem; color: #333; pointer-events: none; }
        .status-label { position: absolute; top: 20px; font-weight: bold; font-size: 1.5rem; opacity: 0; pointer-events: none; }
        .right-label { right: 20px; color: var(--green); }
        .left-label { left: 20px; color: var(--red); }
        .btn-finish { position: fixed; bottom: 30px; padding: 15px 40px; background: #333; color: white; border-radius: 30px; border: none; font-weight: bold; display: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="card-container"></div>
    <button id="finishBtn" class="btn-finish" onclick="sendToGoogleSheet()">Save to Google Sheets</button>

    <script>
        // 1. ADD YOUR CAMPER NAMES HERE
        const camperNames = ["Charlie Brown", "Lucy van Pelt", "Linus van Pelt", "Peppermint Patty", "Snoopy"];
        
        // 2. YOUR GOOGLE SCRIPT URL IS ALREADY HERE
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHQsvC0vSOVTbGFVhJZ3B2jD8YuEqkamPvQRAAtsZ63LhqNE3Ip6liwKGKNqiT2VhVgw/exec"; 

        const attendance = {};
        let cardsSwiped = 0;
        const container = document.getElementById('card-container');

        function createCards() {
            camperNames.forEach((name, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.zIndex = camperNames.length - i;
                card.innerHTML = `<div class="status-label right-label">HERE</div><div class="status-label left-label">AWAY</div><h2>${name}</h2>`;
                container.appendChild(card);
                setupHammer(card, name);
            });
        }

        function setupHammer(el, name) {
            const hammer = new Hammer(el);
            const rLabel = el.querySelector('.right-label');
            const lLabel = el.querySelector('.left-label');

            hammer.on('pan', (e) => {
                el.style.transform = `translate(${e.deltaX}px, ${e.deltaY}px) rotate(${e.deltaX / 15}deg)`;
                if (e.deltaX > 40) { rLabel.style.opacity = 1; lLabel.style.opacity = 0; el.style.borderColor = 'var(--green)'; }
                else if (e.deltaX < -40) { lLabel.style.opacity = 1; rLabel.style.opacity = 0; el.style.borderColor = 'var(--red)'; }
            });

            hammer.on('panend', (e) => {
                if (Math.abs(e.deltaX) > 120) {
                    const isPresent = e.deltaX > 0;
                    el.style.transform = `translate(${isPresent ? 1000 : -1000}px, 0)`;
                    attendance[name] = isPresent ? "Present" : "Absent";
                    cardsSwiped++;
                    if (cardsSwiped === camperNames.length) document.getElementById('finishBtn').style.display = 'block';
                } else {
                    el.style.transform = '';
                    el.style.borderColor = 'transparent';
                    rLabel.style.opacity = 0; lLabel.style.opacity = 0;
                }
            });
        }

        async function sendToGoogleSheet() {
            const btn = document.getElementById('finishBtn');
            btn.innerText = "Saving to Google...";
            const dataToSend = Object.entries(attendance).map(([name, status]) => ({ name, status }));

            try {
                // Sending the swipe data to your link!
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(dataToSend)
                });
                alert("Attendance Saved to your Google Sheet!");
                btn.innerText = "All Done!";
                btn.disabled = true;
                btn.style.background = "#4CAF50";
            } catch (e) {
                alert("Error saving. Make sure you have internet!");
                btn.innerText = "Retry Save";
            }
        }

        createCards();
    </script>
</body>
</html>
